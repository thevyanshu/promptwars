steps:
  # Step 1: Install dependencies
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'frontend'

  # Step 2: Run frontend tests
  - name: 'node:22'
    entrypoint: 'npx'
    args: ['vitest', 'run']
    dir: 'frontend'

  # Step 3: Build for production
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'frontend'
    env:
      - 'VITE_API_BASE_URL=https://travel-engine-backend-258840388638.us-central1.run.app/api/v1'
      - 'VITE_GOOGLE_MAPS_API_KEY=${_MAPS_API_KEY}'

  # Step 4: Deploy to Firebase Hosting
  - name: 'us-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/firebase'
    args: ['deploy', '--only', 'hosting', '--project', '$PROJECT_ID']
    dir: 'frontend'

substitutions:
  _MAPS_API_KEY: 'placeholder'  # Override via trigger config

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
